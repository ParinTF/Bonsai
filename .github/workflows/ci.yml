name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore api/Bonsai.slnx

      - name: Build
        run: dotnet build api/Bonsai.slnx --no-restore

      - name: Test
        run: dotnet test api/Bonsai.Api.Tests --no-build --verbosity normal
