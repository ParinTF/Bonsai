name: CI

on:
  push:
    branches: [main, master]
    # The screenshots job commits straight back to this branch; without this,
    # that commit would re-trigger the workflow (it only ever touches this
    # path, so excluding it here is enough to break the loop on its own —
    # the "[skip ci]" in its commit message is just a second line of defense).
    paths-ignore: [docs/screenshots/**]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore api/Bonsai.slnx

      - name: Build
        run: dotnet build api/Bonsai.slnx --no-restore

      - name: Test
        run: dotnet test api/Bonsai.Api.Tests --no-build --verbosity normal

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check
        run: npx tsc -b

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Start the stack
        run: |
          echo "JWT_KEY=ci-only-$(openssl rand -hex 24)" > .env
          docker compose up --build -d
          # wait for the API to come up
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/health && break
            sleep 2
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Playwright
        working-directory: web
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run browser smoke test
        working-directory: web
        env:
          WEB_URL: http://localhost:3000
          API_URL: http://localhost:8080
        run: node e2e-smoke.mjs

      - name: Stack logs on failure
        if: failure()
        run: docker compose logs --tail 100

  screenshots:
    runs-on: ubuntu-latest
    needs: [e2e]
    # Only for a real push to main/master — a PR's GITHUB_TOKEN can't push
    # back to the branch, and we don't want screenshot drift from PR previews.
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Start the stack
        run: |
          echo "JWT_KEY=ci-only-$(openssl rand -hex 24)" > .env
          docker compose up --build -d
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/health && break
            sleep 2
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Playwright
        working-directory: web
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Refresh README screenshots
        working-directory: web
        env:
          WEB_URL: http://localhost:3000
          API_URL: http://localhost:8080
        run: node e2e-readme-screenshots.mjs

      - name: Commit screenshots if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots
          if git diff --cached --quiet; then
            echo "No screenshot changes"
          else
            git commit -m "docs: refresh README screenshots [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Stack logs on failure
        if: failure()
        run: docker compose logs --tail 100
