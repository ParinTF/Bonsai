server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: client-side routes (/goals/..., /today) resolve to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed build assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
